#Local Database Storage
spring.application.name=timetable-backend
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/timetabledb}
server.port=${PORT:8081}

# MongoDB connection settings
spring.data.mongodb.auto-index-creation=true

# Email Configuration (Gmail SMTP)
#
# Set these in Render dashboard Environment Variables:
#   MAIL_USERNAME = your personal @gmail.com email
#   MAIL_PASSWORD = your 16-character Gmail App Password (NOT your normal password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.from=${MAIL_USERNAME:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false

# Connection timeouts
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000

# File and Payload size limits (to allow Base64 profile pictures)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
